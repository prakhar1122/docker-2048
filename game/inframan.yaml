version: "v1"

service:
  port: 80
  domain: 17.may.docker.2048.inframan.cloud
  path_prefix: /
  scaling:
    type: concurrency
    min_replicas: 0
    max_replicas: 2
    target: 100
  resources:
    cpu_request: "103m"
    memory_request: "256Mi"

build:
  method: docker
  dockerfile: ./Dockerfile

env:
  APP_NAME: "game-from-yaml"