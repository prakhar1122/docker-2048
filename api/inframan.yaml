# Managed by Inframan — generated from console config. Edits here are the source of truth.
version: v1
service:
    port: 8080
    domain: 8june.inframan.cloud
    path_prefix: /
    node_pool: application-pool
    scaling:
        type: concurrency
        min_replicas: 1
        max_replicas: 3
        target: 100
    resources:
        cpu_request: 50m
        memory_request: 64Mi
        cpu_limit: 200m
        memory_limit: 128Mi
    network:
        private: false
        timeout_seconds: 60
        liveness_probe:
            path: /ping
            timeout_seconds: 2
            period_seconds: 10
            failure_threshold: 3
        readiness_probe:
            path: /ping
            timeout_seconds: 2
            period_seconds: 5
            initial_delay_seconds: 5
            failure_threshold: 3
        startup_probe:
            path: /ping
            timeout_seconds: 2
            period_seconds: 5
            failure_threshold: 30
        vs_annotations:
            inframan.cloud/component: api
env:
    LOG_LEVEL: info
connections:
    GAME_URL: service/game
    REDIS_URL: redis/sessions
secrets:
    TEST_HAHA: TEST_HAHA
build:
    method: docker
    dockerfile: ./Dockerfile
